<p *ngIf="errMessage!=''">Error: {{errMessage}}</p>

<div class="form-row">
    Book Id:
    <input type="text" [(ngModel)]="bookId" placeholder="Nhập Book Id" />
    <button (click)="deleteBook()">Delete Book</button>
</div>

<table border="1" style="width:100%; margin-top:10px">
    <thead>
        <tr>
            <th>BookId</th>
            <th>BookName</th>
            <th>Price</th>
            <th>Image</th>
        </tr>
    </thead>
    <tbody>
        <tr *ngFor="let book of books">
            <td>{{book.id}}</td>
            <td>{{book.tenSach}}</td>
            <td>{{book.giaBan}}</td>
            <td>
                <img src="http://localhost:3000/images/books/{{book.anhBia}}" width="50px" height="50px">
            </td>
        </tr>
    </tbody>
</table>
